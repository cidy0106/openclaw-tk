$schema: https://raw.githubusercontent.com/electron-userland/electron-builder/master/packages/app-builder-lib/scheme.json
appId: com.freeclaw.desktop
productName: FreeClaw
copyright: Copyright © 2026 FreeClaw Contributors
asar: true
asarUnpack:
  - dist/gateway-bundle.mjs
  - dist/skia.darwin-arm64-*.node
  - dist/node_modules/**/*

files:
  - dist/electron/**/*
  - dist/control-ui/**/*
  - dist/gateway-bundle.mjs
  - dist/gateway-bundle.mjs.map
  - dist/skia.darwin-arm64-*.node
  - dist/node_modules/**/*
  - package.json

extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
  darkModeSupport: true

dmg:
  title: FreeClaw
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
