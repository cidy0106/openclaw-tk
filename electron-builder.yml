$schema: https://raw.githubusercontent.com/electron-userland/electron-builder/master/packages/app-builder-lib/scheme.json
appId: com.freeclaw.desktop
productName: FreeClaw
copyright: Copyright © 2026 FreeClaw Contributors
asar: true
asarUnpack:
  - dist/entry.js
  - dist/index.js
  - dist/**/*.js
  - node_modules/**/*
  - openclaw.mjs
  - extensions/**/*
  - skills/**/*

files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - openclaw.mjs
  - "!node_modules/.cache"
  - "!node_modules/@playwright"
  - "!node_modules/playwright*"
  - "!node_modules/electron"
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/*.spec.*"

extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
  darkModeSupport: true

dmg:
  title: FreeClaw
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
