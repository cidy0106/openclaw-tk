appId: com.freeclaw.desktop
productName: FreeClaw
copyright: Copyright © 2026 FreeClaw Contributors

directories:
  output: release
  buildResources: assets

files:
  - dist/electron/**/*
  - dist/control-ui/**/*
  - "!node_modules"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true

dmg:
  title: "FreeClaw ${version}"
  background: assets/dmg-background.png
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

asar: true
